# Play 1: тільки OS hardening (sysctl, kernel, filesystem)
- name: "OS Hardening"
  hosts: online_hosts
  gather_facts: yes
  vars:
    os_desktop_enable: false
    os_security_kernel_enable_module_loading: true
    os_security_users_allow: []
    ufw_default_input_policy: DROP
    ufw_default_output_policy: ACCEPT
    ufw_default_forward_policy: DROP
    ufw_rules:
      - rule: allow
        port: "22"
        proto: tcp
  pre_tasks:
    - name: "UFW allow SSH перед hardening"
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      become: yes
  roles:
    - devsec.hardening.os_hardening
  # Handlers цього play відстрілюють — SSH не чіпали, все чисто

# Play 2: тільки SSH + fail2ban (geerlingguy.security)
- name: "SSH та Fail2ban hardening"
  hosts: online_hosts
  gather_facts: yes
  vars:
    ssh_password_authentication: "no"
    ssh_permit_root_login: "no"
    ssh_port: [22]
    ssh_max_auth_retries: 3
    ssh_client_alive_interval: 300
    ssh_client_alive_count_max: 2
    security_autoupdate_enabled: true
    security_fail2ban_enabled: false   # керуємо вручну нижче
    security_ssh_restart_handler_state: stopped
  pre_tasks:
    - name: "Зупиняємо fail2ban на час hardening"
      service:
        name: fail2ban
        state: stopped
      ignore_errors: yes
      become: yes

    - name: "Розмаскуємо і перемикаємо ssh.socket → ssh.service"
      block:
        - command: systemctl unmask {{ item }}
          loop: [ssh.socket, ssh.service]
        - systemd:
            name: ssh.socket
            enabled: no
            state: stopped
        - systemd:
            name: ssh.service
            enabled: yes
            state: started
            daemon_reload: yes
      become: yes
      ignore_errors: yes

  roles:
    - geerlingguy.security
  # Handler: SSH зупиняється (stopped), fail2ban handler не тригериться

  post_tasks:
    - name: "Рестарт SSH після hardening"
      systemd:
        name: ssh.service
        state: restarted
        daemon_reload: yes
      become: yes
      ignore_errors: yes

    - name: "Чекаємо відновлення SSH"
      wait_for_connection:
        delay: 5
        timeout: 90
      become: no

    - name: "Запускаємо fail2ban"
      service:
        name: fail2ban
        state: started
        enabled: yes
      become: yes

# Play 3: перевірка
- name: "Перевірка результату"
  hosts: online_hosts
  gather_facts: no
  tasks:
    - name: "SSH доступний"
      ping:
    - name: "fail2ban активний"
      systemd:
        name: fail2ban
      register: f2b
      become: yes
    - debug:
        msg: "fail2ban: {{ f2b.status.ActiveState }}"