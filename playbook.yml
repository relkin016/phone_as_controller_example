# Play 1: Пінг і формування групи online_hosts
- name: "Перевірка з'єднання зі знайденими хостами"
  hosts: scanned
  gather_facts: no
  become: no
  tasks:
    - name: "Пінгуємо хост"
      ping:
      ignore_unreachable: yes
      register: host_ping

    - name: "Додаємо хост до групи якщо відповів"
      group_by:
        key: "online_hosts"
      when: host_ping.unreachable is not defined

# Play 2: Зупинка якщо живих хостів 0
- name: "Перевірка результатів пінгу"
  hosts: localhost
  gather_facts: no
  become: no
  tasks:
    - name: "Зупиняємо пайплайн якщо живих хостів 0"
      fail:
        msg: "КРИТИЧНА ПОМИЛКА: Жоден з хостів не відповів по SSH!"
      when: groups['online_hosts'] | default([]) | length == 0

- name: "Nginx demonstration"
  hosts: online_hosts
  gather_facts: yes
  roles:
  - role: geerlingguy.nginx
  tasks:
    - name: Дозволити трафік на порт 80 (HTTP) через UFW
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp
        state: enabled

    - name: Створити користувацький index.html
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'
        content: |
          <!DOCTYPE html>
          <html lang="uk">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Вітаємо на сервері</title>
              <style>
                  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
                  h1 { color: #333; }
              </style>
          </head>
          <body>
              <h1>Сервер успішно налаштовано за допомогою Ansible!</h1>
              <p>Роль Nginx, UFW та кастомний index.html працюють.</p>
              <p>Виконав: курсант Йолкін.</p>
          </body>
          </html>