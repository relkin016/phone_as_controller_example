# Play 1: Пінг і формування групи online_hosts
- name: "Перевірка з'єднання зі знайденими хостами"
  hosts: scanned
  gather_facts: no
  become: no
  tasks:
    - name: "Пінгуємо хост"
      ping:
      ignore_unreachable: yes
      register: host_ping

    - name: "Додаємо хост до групи якщо відповів"
      group_by:
        key: "online_hosts"
      when: host_ping.unreachable is not defined

# Play 2: Зупинка якщо живих хостів 0
- name: "Перевірка результатів пінгу"
  hosts: localhost
  gather_facts: no
  become: no
  tasks:
    - name: "Зупиняємо пайплайн якщо живих хостів 0"
      fail:
        msg: "КРИТИЧНА ПОМИЛКА: Жоден з хостів не відповів по SSH!"
      when: groups['online_hosts'] | default([]) | length == 0

- name: "Nginx demonstration"
  hosts: online_hosts
  gather_facts: yes
  roles:
  - role: geerlingguy.nginx
  tasks:
    - name: Дозволити трафік на порт 80 (HTTP) через UFW
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp
        state: enabled

    - name: Дозволити трафік на порт 80 (HTTP) через UFW
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp
        state: enabled

    - name: Створити користувацький index.html із вбудованим кодом для комісії
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'
        content: |
          <!DOCTYPE html>
          <html lang="uk">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Статус розгортання | Інфраструктура</title>
              <style>
                  :root {
                      --bg-color: #0f172a;
                      --card-bg: #1e293b;
                      --text-main: #f8fafc;
                      --text-muted: #94a3b8;
                      --accent-color: #3b82f6;
                      --success-color: #10b981;
                  }
          
                  body {
                      margin: 0;
                      padding: 0;
                      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                      background-color: var(--bg-color);
                      color: var(--text-main);
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      min-height: 100vh;
                  }
          
                  .container {
                      background-color: var(--card-bg);
                      border-radius: 16px;
                      padding: 40px 50px;
                      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                      max-width: 600px;
                      width: 100%;
                      text-align: center;
                      border: 1px solid #334155;
                  }
          
                  .header-logo {
                      font-size: 3rem;
                      margin-bottom: 10px;
                  }
          
                  h1 {
                      font-size: 1.8rem;
                      margin-top: 0;
                      margin-bottom: 10px;
                      letter-spacing: 0.5px;
                  }
          
                  .subtitle {
                      color: var(--text-muted);
                      font-size: 1rem;
                      margin-bottom: 30px;
                  }
          
                  .status-box {
                      display: inline-flex;
                      align-items: center;
                      background-color: rgba(16, 185, 129, 0.1);
                      border: 1px solid rgba(16, 185, 129, 0.3);
                      padding: 12px 24px;
                      border-radius: 50px;
                      margin-bottom: 35px;
                  }
          
                  .pulse {
                      width: 12px;
                      height: 12px;
                      background-color: var(--success-color);
                      border-radius: 50%;
                      margin-right: 12px;
                      box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
                      animation: pulse 1.5s infinite;
                  }
          
                  @keyframes pulse {
                      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
                      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
                      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
                  }
          
                  .status-text {
                      color: var(--success-color);
                      font-weight: 600;
                      letter-spacing: 1px;
                      text-transform: uppercase;
                  }
          
                  .details-grid {
                      display: grid;
                      grid-template-columns: 1fr 1fr;
                      gap: 20px;
                      text-align: left;
                      margin-top: 20px;
                      border-top: 1px solid #334155;
                      padding-top: 30px;
                  }
          
                  .detail-item {
                      display: flex;
                      flex-direction: column;
                  }
          
                  .detail-label {
                      color: var(--text-muted);
                      font-size: 0.85rem;
                      text-transform: uppercase;
                      letter-spacing: 0.5px;
                      margin-bottom: 5px;
                  }
          
                  .detail-value {
                      font-weight: 500;
                      font-size: 1.05rem;
                      color: #cbd5e1;
                  }
          
                  .footer {
                      margin-top: 40px;
                      font-size: 0.8rem;
                      color: #64748b;
                  }
              </style>
          </head>
          <body>
          
              <div class="container">
                  <div class="header-logo">🚀</div>
                  <h1>Пайплайн Розгорнуто Успішно</h1>
                  <div class="subtitle">Демонстрація роботи автоматизованої системи CI/CD</div>
          
                  <div class="status-box">
                      <div class="pulse"></div>
                      <span class="status-text">Система в штатному режимі</span>
                  </div>
          
                  <div class="details-grid">
                      <div class="detail-item">
                          <span class="detail-label">Модуль</span>
                          <span class="detail-value">Система керування інфраструктурою</span>
                      </div>
                      <div class="detail-item">
                          <span class="detail-label">Автоматизація</span>
                          <span class="detail-value">Jenkins & Ansible</span>
                      </div>
                      <div class="detail-item">
                          <span class="detail-label">Веб-сервер</span>
                          <span class="detail-value">Nginx (Port 80)</span>
                      </div>
                      <div class="detail-item">
                          <span class="detail-label">Тип вузла</span>
                          <span class="detail-value">Мобільний керуючий вузол (МКВ)</span>
                      </div>
                  </div>
          
                  <div class="footer">
                      Автоматичне розгортання виконано без помилок. Конфігурація застосована.
                  </div>
              </div>
          
          </body>
          </html>