- name: "Перевірка з'єднання зі знайденими хостами"
  hosts: scanned
  gather_facts: no
  become: no
  tasks:
    - name: "Пінгуємо хост"
      ping:
      ignore_unreachable: yes
      register: host_ping

    - name: "Додаємо хост до тимчасової групи, якщо він відповів"
      group_by:
        key: "online_hosts"
      when: host_ping.unreachable is not defined

- name: "Перевірка результатів пінгу"
  hosts: localhost
  gather_facts: no
  become: no
  tasks:
    - name: "Зупиняємо пайплайн, якщо живих хостів 0"
      fail:
        msg: "КРИТИЧНА ПОМИЛКА: Жоден з хостів не відповів по SSH!"
      when: groups['online_hosts'] | default([]) | length == 0

- name: "Розгортання конфігурації на доступних хостах"
  hosts: online_hosts
  gather_facts: yes
  pre_tasks:
    - name: "UFW allow SSH перед hardening"
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      become: yes

  roles:
    - devsec.hardening.os_hardening
  vars:
    os_desktop_enable: false
    os_security_kernel_enable_module_loading: true
    os_security_users_allow: [ ]
    ufw_default_input_policy: DROP
    ufw_default_output_policy: ACCEPT
    ufw_default_forward_policy: DROP
    ufw_rules:
      - rule: allow
        port: "22"
        proto: tcp

- name: "SSH та Fail2ban hardening"
  hosts: online_hosts
  gather_facts: yes
  ignore_unreachable: yes
  pre_tasks:
    - name: "Зупинити unattended-upgrades"
      service:
        name: unattended-upgrades
        state: stopped
      become: yes
      ignore_errors: yes

    - name: "Прибрати застарілий параметр ChallengeResponseAuthentication"
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^ChallengeResponseAuthentication'
        state: absent
      become: yes

    - name: "Дочекатись звільнення dpkg lock"
      shell: |
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          sleep 3
        done
      become: yes
      changed_when: false

    - name: "Розмаскуємо ssh.socket і ssh.service"
      command: systemctl unmask {{ item }}
      loop:
        - ssh.socket
        - ssh.service
      become: yes
      ignore_errors: yes

    - name: "Вбити залишкові процеси sshd"
      shell: pkill -x sshd || true
      become: yes
      changed_when: false

    - name: "Пауза після pkill"
      pause:
        seconds: 2

    - name: "Вмикаємо ssh.service"
      systemd:
        name: ssh.service
        enabled: yes
        state: restarted
        daemon_reload: yes
      become: yes

    - name: "Переконатись що ssh.service enabled"
      systemd:
        name: ssh.service
        enabled: yes
      become: yes

  vars:
    security_ssh_extra_config: |
      KbdInteractiveAuthentication no
    ssh_permit_root_login: "no"
    ssh_max_auth_retries: 3
    ssh_client_alive_interval: 300
    ssh_client_alive_count_max: 2
    security_autoupdate_enabled: true
    security_fail2ban_enabled: true
    security_ssh_restart_handler_state: restarted

  roles:
    - geerlingguy.security

  post_tasks:
    - name: "Вбити залишкові процеси sshd"
      shell: |
        pkill -x sshd || true
        sleep 1
      become: yes
      changed_when: false

    - name: "Рестарт SSH після hardening"
      systemd:
        name: ssh.service
        state: restarted
        daemon_reload: yes
      become: yes
      ignore_errors: yes

    - name: "Чекаємо відновлення SSH"
      wait_for_connection:
        delay: 5
        timeout: 90
      become: no

    - name: "Запустити unattended-upgrades назад"
      service:
        name: unattended-upgrades
        state: started
        enabled: yes
      become: yes

    - name: "Запускаємо fail2ban"
      service:
        name: fail2ban
        state: started
        enabled: yes
      become: yes

- name: "Перевірка результату"
  hosts: online_hosts
  gather_facts: no
  tasks:
    - name: "SSH доступний"
      ping:

    - name: "Статус fail2ban"
      systemd:
        name: fail2ban
      register: f2b
      become: yes

    - debug:
        msg: "fail2ban: {{ f2b.status.ActiveState }}"