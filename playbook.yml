#playbook.yml
- name: "Перевірка з'єднання зі знайденими хостами"
  hosts: scanned
  gather_facts: no
  become: no
  tasks:
    - name: "Пінгуємо хост"
      ping:
      ignore_unreachable: yes
      register: host_ping

    - name: "Додаємо хост до тимчасової групи, якщо він відповів"
      group_by:
        key: "online_hosts"
      when: host_ping.unreachable is not defined

- name: "Перевірка результатів пінгу"
  hosts: localhost
  gather_facts: no
  become: no
  tasks:
    - name: "Зупиняємо пайплайн, якщо живих хостів 0"
      fail:
        msg: "КРИТИЧНА ПОМИЛКА: Жоден з хостів не відповів по SSH!"
      when: groups.get('online_hosts', []) | length == 0

- name: "Розгортання конфігурації на доступних хостах"
  hosts: online_hosts
  gather_facts: yes
  vars:
    ssh_permit_root_login: "no"
    ansible_ssh_retries: 5
    ssh_password_authentication: "no"
    ssh_port: [22]
    ssh_max_auth_retries: 3
    ssh_client_alive_interval: 300
    ssh_client_alive_count_max: 2
    ssh_hardening_os_vars_enabled: false
    ssh_allow_users: "{{ ansible_user }}"
    os_desktop_enable: false
    os_security_kernel_enable_module_loading: true
    os_security_users_allow: []
    ufw_default_input_policy: DROP
    ufw_default_output_policy: ACCEPT
    ufw_default_forward_policy: DROP
    security_autoupdate_enabled: true
    security_fail2ban_enabled: true
    ufw_rules:
        - rule: allow
          port: 22
          proto: tcp

  roles:
    - devsec.hardening.ssh_hardening
    - devsec.hardening.os_hardening
    - geerlingguy.security

  pre_tasks:
    - name: "Зупиняємо fail2ban на час hardening"
      service:
        name: fail2ban
        state: stopped
      ignore_errors: yes
      become: yes

    - name: "Розмаскуємо ssh.socket і ssh.service"
      command: systemctl unmask {{ item }}
      loop:
        - ssh.socket
        - ssh.service
      become: yes
      ignore_errors: yes

    # ✅ Вимикаємо socket-активацію
    - name: "Вимикаємо ssh.socket"
      systemd:
        name: ssh.socket
        enabled: no
        state: stopped
      become: yes
      ignore_errors: yes

    # ✅ Запускаємо класичний ssh.service
    - name: "Вмикаємо ssh.service"
      systemd:
        name: ssh.service
        enabled: yes
        state: started
        daemon_reload: yes
      become: yes

    - name: "UFW allow SSH перед hardening"
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      become: yes
      ignore_errors: yes

  post_tasks:
      # ✅ Чекаємо поки SSH повернеться після перезапуску
      - name: "Чекаємо відновлення SSH після hardening"
        wait_for_connection:
            host: "{{ inventory_hostname }}"
            port: 22
            delay: 5
            timeout: 60
            state: started
        delegate_to: localhost
        become: no

      # ✅ Запускаємо fail2ban після hardening
      - name: "Запускаємо fail2ban після hardening"
        service:
            name: fail2ban
            state: started
            enabled: yes
        become: yes
        ignore_errors: yes